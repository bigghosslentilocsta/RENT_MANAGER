services:
  - type: web
    name: punnam-rent-manager
    env: node
    plan: free
    branch: main
    buildCommand: npm ci --include=dev --prefix frontend && npm run build --prefix frontend && npm ci --prefix backend
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
